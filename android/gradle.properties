# Augmentation de la mémoire pour éviter les erreurs "Out of Memory" pendant la compilation
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError

# Support des bibliothèques AndroidX (standard moderne)
android.useAndroidX=true

# Aide à la conversion des anciennes bibliothèques vers AndroidX
android.enableJetifier=true