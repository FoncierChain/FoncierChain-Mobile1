name: foncier_chain
description: Application mobile citoyenne de vérification foncière immuable.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.3
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  provider: ^6.1.2
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: MaterialIcons
