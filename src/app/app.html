<div class="min-h-screen bg-[#0F1115] flex justify-center items-center py-8">
  <!-- Mobile Simulator Frame -->
  <div class="w-full max-w-[430px] h-[90vh] max-h-[850px] bg-[#0F1115] border-[8px] border-[#2C2F36] rounded-[48px] relative flex flex-col overflow-hidden shadow-[0_50px_100px_-20px_rgba(0,0,0,0.5)]">
    
    <!-- Status Bar Area (Mock) -->
    <div class="h-11 px-8 flex justify-between items-center text-[13px] text-[#94A3B8] font-semibold">
      <span>23:48</span>
      <div class="flex gap-2">
        <span class="material-icons text-[16px]">signal_cellular_alt</span>
        <span class="material-icons text-[16px]">wifi</span>
        <span class="material-icons text-[16px]">battery_full</span>
      </div>
    </div>

    <!-- Main Content Scrollable Area -->
    <main class="flex-1 overflow-y-auto px-6 pt-2 pb-24 style-scrollbar">
      <router-outlet></router-outlet>
    </main>

    <!-- Bottom Navigation -->
    <nav class="h-20 bg-[#1A1C20]/90 backdrop-blur-xl border-t border-white/5 flex justify-around items-center px-4 absolute bottom-0 left-0 right-0 z-40">
      <a routerLink="/" routerLinkActive="text-[#C5A059]" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center gap-1 text-[#94A3B8] transition-colors">
        <span class="material-icons">home</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Accueil</span>
      </a>
      <a routerLink="/verify" routerLinkActive="text-[#C5A059]" class="flex flex-col items-center gap-1 text-[#94A3B8] transition-colors">
        <span class="material-icons">verified_user</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Vérifier</span>
      </a>
      <a routerLink="/map" routerLinkActive="text-[#C5A059]" class="flex flex-col items-center gap-1 text-[#94A3B8] transition-colors">
        <span class="material-icons">map</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Carte</span>
      </a>
      <a routerLink="/agent" routerLinkActive="text-[#C5A059]" class="flex flex-col items-center gap-1 text-[#94A3B8] transition-colors">
        <span class="material-icons">admin_panel_settings</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">Espace Agent</span>
      </a>
    </nav>

    <!-- Error Overlay -->
    <app-error-boundary></app-error-boundary>
  </div>
</div>
